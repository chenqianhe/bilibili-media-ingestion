services:

  # Local services are available on their ports, but also available on:
  # http://api.localhost.tiangolo.com: backend
  # http://dashboard.localhost.tiangolo.com: frontend
  # etc. To enable it, update .env or .env.local, set:
  # DOMAIN=localhost.tiangolo.com
  proxy:
    image: traefik:3.6
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "80:80"
      - "8090:8080"
    # Duplicate the command from compose.yml to add --api.insecure=true
    command:
      # Enable Docker in Traefik, so that it reads labels from Docker services
      - --providers.docker
      # Add a constraint to only use services with the label for this stack
      - --providers.docker.constraints=Label(`traefik.constraint-label`, `traefik-public`)
      # Do not expose all Docker services, only the ones explicitly exposed
      - --providers.docker.exposedbydefault=false
      # Create an entrypoint "http" listening on port 80
      - --entrypoints.http.address=:80
      # Create an entrypoint "https" listening on port 443
      - --entrypoints.https.address=:443
      # Enable the access log, with HTTP requests
      - --accesslog
      # Enable the Traefik log, for configurations and errors
      - --log
      # Enable debug logging for local development
      - --log.level=DEBUG
      # Enable the Dashboard and API
      - --api
      # Enable the Dashboard and API in insecure mode for local development
      - --api.insecure=true
    labels:
      # Enable Traefik for this service, to make it available in the public network
      - traefik.enable=true
      - traefik.constraint-label=traefik-public
      # Dummy https-redirect middleware that doesn't really redirect, only to
      # allow running it locally
      - traefik.http.middlewares.https-redirect.contenttype.autodetect=false
    networks:
      - traefik-public
      - default

  db:
    restart: "no"
    ports:
      - "5432:5432"

  test-db:
    image: postgres:18
    restart: "no"
    profiles:
      - test
    ports:
      - "55432:5432"
    env_file:
      - path: .env.test
        required: true
      - path: .env.test.local
        required: false
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    volumes:
      - app-test-db-data:/var/lib/postgresql/data/pgdata

  minio:
    image: minio/minio
    restart: "no"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123456
    ports:
      - "9000:9000"
      - "9001:9001"

  adminer:
    restart: "no"
    ports:
      - "8080:8080"

  backend:
    restart: "no"
    ports:
      - "8000:8000"
    build:
      context: .
      dockerfile: backend/Dockerfile
    # command: sleep infinity  # Infinite loop to keep container alive doing nothing
    command:
      - fastapi
      - run
      - --reload
      - "app/main.py"
    develop:
      watch:
        - path: ./backend
          action: sync
          target: /app/backend
          ignore:
            - ./backend/.venv
            - .venv
        - path: ./backend/pyproject.toml
          action: rebuild
    # TODO: remove once coverage is done locally
    volumes:
      - ./backend/htmlcov:/app/backend/htmlcov
    environment:
      SMTP_HOST: "mailcatcher"
      SMTP_PORT: "1025"
      SMTP_TLS: "false"
      EMAILS_FROM_EMAIL: "noreply@example.com"
      S3_ENDPOINT_URL: "${S3_ENDPOINT_URL:-http://minio:9000}"
      S3_ACCESS_KEY: "${S3_ACCESS_KEY:-minio}"
      S3_SECRET_KEY: "${S3_SECRET_KEY:-minio123456}"
      S3_BUCKET: "${S3_BUCKET:-bili-media-dev}"
      BACKEND_PUBLIC_URL: "${BACKEND_PUBLIC_URL:-http://localhost:8000}"

  metadata-worker:
    restart: "no"
    build:
      context: .
      dockerfile: backend/Dockerfile
    command:
      - python
      - -m
      - app.workers.metadata_ingest
      - --poll-interval
      - "2"
    develop:
      watch:
        - path: ./backend
          action: sync
          target: /app/backend
          ignore:
            - ./backend/.venv
            - .venv
        - path: ./backend/pyproject.toml
          action: rebuild
    environment:
      SMTP_HOST: "mailcatcher"
      SMTP_PORT: "1025"
      SMTP_TLS: "false"
      EMAILS_FROM_EMAIL: "noreply@example.com"
      S3_ENDPOINT_URL: "${S3_ENDPOINT_URL:-http://minio:9000}"
      S3_ACCESS_KEY: "${S3_ACCESS_KEY:-minio}"
      S3_SECRET_KEY: "${S3_SECRET_KEY:-minio123456}"
      S3_BUCKET: "${S3_BUCKET:-bili-media-dev}"
      BACKEND_PUBLIC_URL: "${BACKEND_PUBLIC_URL:-http://localhost:8000}"

  download-worker:
    restart: "no"
    build:
      context: .
      dockerfile: backend/Dockerfile
    command:
      - python
      - -m
      - app.workers.download_ingest
      - --poll-interval
      - "2"
    develop:
      watch:
        - path: ./backend
          action: sync
          target: /app/backend
          ignore:
            - ./backend/.venv
            - .venv
        - path: ./backend/pyproject.toml
          action: rebuild
    volumes:
      - ./backend/.secrets:/app/backend/.secrets:ro
    environment:
      SMTP_HOST: "mailcatcher"
      SMTP_PORT: "1025"
      SMTP_TLS: "false"
      EMAILS_FROM_EMAIL: "noreply@example.com"
      S3_ENDPOINT_URL: "${S3_ENDPOINT_URL:-http://minio:9000}"
      S3_ACCESS_KEY: "${S3_ACCESS_KEY:-minio}"
      S3_SECRET_KEY: "${S3_SECRET_KEY:-minio123456}"
      S3_BUCKET: "${S3_BUCKET:-bili-media-dev}"
      BACKEND_PUBLIC_URL: "${BACKEND_PUBLIC_URL:-http://localhost:8000}"

  upload-worker:
    restart: "no"
    build:
      context: .
      dockerfile: backend/Dockerfile
    command:
      - python
      - -m
      - app.workers.upload_ingest
      - --poll-interval
      - "2"
    develop:
      watch:
        - path: ./backend
          action: sync
          target: /app/backend
          ignore:
            - ./backend/.venv
            - .venv
        - path: ./backend/pyproject.toml
          action: rebuild
    environment:
      SMTP_HOST: "mailcatcher"
      SMTP_PORT: "1025"
      SMTP_TLS: "false"
      EMAILS_FROM_EMAIL: "noreply@example.com"
      S3_ENDPOINT_URL: "${S3_ENDPOINT_URL:-http://minio:9000}"
      S3_ACCESS_KEY: "${S3_ACCESS_KEY:-minio}"
      S3_SECRET_KEY: "${S3_SECRET_KEY:-minio123456}"
      S3_BUCKET: "${S3_BUCKET:-bili-media-dev}"
      BACKEND_PUBLIC_URL: "${BACKEND_PUBLIC_URL:-http://localhost:8000}"

  processing-worker:
    restart: "no"
    build:
      context: .
      dockerfile: backend/Dockerfile
    command:
      - python
      - -m
      - app.workers.media_processing
      - --poll-interval
      - "2"
    develop:
      watch:
        - path: ./backend
          action: sync
          target: /app/backend
          ignore:
            - ./backend/.venv
            - .venv
        - path: ./backend/pyproject.toml
          action: rebuild
    environment:
      SMTP_HOST: "mailcatcher"
      SMTP_PORT: "1025"
      SMTP_TLS: "false"
      EMAILS_FROM_EMAIL: "noreply@example.com"
      S3_ENDPOINT_URL: "${S3_ENDPOINT_URL:-http://minio:9000}"
      S3_ACCESS_KEY: "${S3_ACCESS_KEY:-minio}"
      S3_SECRET_KEY: "${S3_SECRET_KEY:-minio123456}"
      S3_BUCKET: "${S3_BUCKET:-bili-media-dev}"
      BACKEND_PUBLIC_URL: "${BACKEND_PUBLIC_URL:-http://localhost:8000}"

  mailcatcher:
    image: schickling/mailcatcher
    ports:
      - "1080:1080"
      - "1025:1025"

  frontend:
    restart: "no"
    ports:
      - "5173:80"
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
        - NODE_ENV=development

  playwright:
    build:
      context: .
      dockerfile: frontend/Dockerfile.playwright
      args:
        - VITE_API_URL=http://backend:8000
        - NODE_ENV=production
    ipc: host
    depends_on:
      - backend
      - mailcatcher
    env_file:
      - path: .env
        required: true
      - path: .env.local
        required: false
    environment:
      - VITE_API_URL=http://backend:8000
      - MAILCATCHER_HOST=http://mailcatcher:1080
      # For the reports when run locally
      - PLAYWRIGHT_HTML_HOST=0.0.0.0
      - CI=${CI}
    volumes:
      - ./frontend/blob-report:/app/frontend/blob-report
      - ./frontend/test-results:/app/frontend/test-results
    ports:
      - 9323:9323

networks:
  traefik-public:
    # For local dev, don't expect an external Traefik network
    external: false

volumes:
  app-test-db-data:
